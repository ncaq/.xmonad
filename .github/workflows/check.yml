name: check

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions:
  contents: read # リポジトリコンテンツの読み取り
  id-token: write # niks3 OIDC認証

jobs:
  nix-flake-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ncaq/nix-composite-action@87f6ca5941aa5e43013ce99c6c8a3aaaa8bebdaa # v3.0.1
      - run: nix flake check
